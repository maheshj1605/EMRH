version: '3.8'
services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: healthdesk
      MYSQL_USER: hduser
      MYSQL_PASSWORD: hdpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:mysql://db:3306/healthdesk
      DB_USERNAME: hduser
      DB_PASSWORD: hdpassword
      # IMPORTANT: Change this in production. Use a 256-bit random secret.
      JWT_SECRET: ${JWT_SECRET:-CHANGE_ME_use_real_256bit_secret_in_prod}
      CORS_ORIGINS: http://localhost:5173,http://localhost:80
      DDL_AUTO: update
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
