spring.application.name=healthdesk-api
server.port=8080

# Database - always override via env vars in production
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/healthdesk}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000

# JPA / Hibernate
# Use 'validate' in production; 'update' only for development
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT config — MUST be overridden via JWT_SECRET env var in production
jwt.secret=${JWT_SECRET:CHANGE_ME_use_a_256bit_secret_in_production_never_commit_this}
jwt.expiration=86400000

# CORS — set CORS_ORIGINS env var to your frontend URL in production
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:80}
